# Render Blueprint: https://render.com/docs/blueprint-spec
# Free Postgres is time-limited on Render; see https://render.com/docs/free
databases:
  - name: donation-db
    plan: free
    region: oregon

services:
  - type: web
    name: donation-web
    runtime: docker
    plan: free
    region: oregon
    rootDir: donation
    dockerfilePath: ./Dockerfile
    # Build context is the service root (donation/), same as Dockerfile paths.
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: donation.settings_production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: donation-db
          property: connectionString
